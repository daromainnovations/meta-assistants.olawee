<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLAWEE | Panel de Ejecuciones</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Prism.js para colorear el JSON visualmente como en VSCode o N8N -->
    <link href="https://cdnjs.cloudflare.com/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1f2937;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-100 font-sans antialiased min-h-screen">

    <!-- Navbar Superior -->
    <header class="bg-gray-800 border-b border-gray-700 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">🛡️</span>
                    <h1 class="text-xl font-bold tracking-tight text-white">OLAWEE <span
                            class="text-blue-400 font-light">Execution Viewer</span></h1>
                </div>
                <div>
                    <span
                        class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-green-900 text-green-300">
                        <span class="h-2 w-2 bg-green-400 rounded-full mr-2"></span>
                        Sistema Operativo
                    </span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <div class="flex items-center justify-between mb-6">
            <h2 class="text-lg font-semibold text-gray-200">Últimas Ejecuciones <span id="filterLabel"
                    class="text-sm font-normal text-gray-400 ml-2">(Global)</span></h2>
            <div class="flex gap-2">
                <button onclick="setFilter('ALL')"
                    class="filter-btn bg-gray-700 hover:bg-gray-600 outline outline-2 outline-blue-500 text-white px-3 py-1.5 rounded shadow text-sm transition-all">🌐
                    Todas</button>
                <button onclick="setFilter('CHATS')"
                    class="filter-btn bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-white px-3 py-1.5 rounded shadow text-sm transition-all">🤖
                    LLM Chats</button>
                <button onclick="setFilter('ASSISTANTS')"
                    class="filter-btn bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-white px-3 py-1.5 rounded shadow text-sm transition-all">🧠
                    Assistants</button>
                <button onclick="setFilter('PYMES')"
                    class="filter-btn bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-white px-3 py-1.5 rounded shadow text-sm transition-all">💼
                    PYMES</button>

                <button id="refreshBtn" onclick="fetchExecutions()"
                    class="ml-4 bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded shadow transition-colors flex items-center gap-2 text-sm font-medium">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Actualizar Datos
                </button>
            </div>
        </div>

        <!-- Tabla estilo N8N -->
        <div class="bg-gray-800 shadow-xl rounded-lg overflow-hidden border border-gray-700">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-700">
                    <thead class="bg-gray-750">
                        <tr>
                            <th scope="col"
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">
                                Estado</th>
                            <th scope="col"
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">
                                Flujo / Proveedor</th>
                            <th scope="col"
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">
                                Fecha Invocación</th>
                            <th scope="col"
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider">
                                Ejecución ID</th>
                            <th scope="col"
                                class="px-6 py-4 text-right text-xs font-semibold text-gray-400 uppercase tracking-wider">
                                Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="executionsTable" class="divide-y divide-gray-700 bg-gray-800/50">
                        <!-- Las filas se inyectarán por JS aquí -->
                        <tr>
                            <td colspan="5" class="px-6 py-8 text-center text-gray-400">
                                Cargando ejecuciones desde Supabase...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- Modal para ver el JSON al estilo N8N -->
    <div id="jsonModal"
        class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div
            class="bg-gray-800 rounded-xl shadow-2xl w-full max-w-4xl border border-gray-600 flex flex-col max-h-[90vh]">

            <!-- Header Modal -->
            <div class="px-6 py-4 border-b border-gray-700 flex justify-between items-center bg-gray-800 rounded-t-xl">
                <h3 class="text-lg font-bold text-white flex items-center gap-2">
                    <span id="modalIcon">📝</span> Detalles de Ejecución
                </h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white transition">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Body Modal -->
            <div class="p-6 overflow-y-auto custom-scrollbar flex-1 bg-gray-900/50">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <!-- Box: INPUT -->
                    <div>
                        <h4
                            class="text-sm font-semibold text-blue-400 uppercase tracking-wider mb-2 flex items-center gap-2">
                            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                            </svg>
                            Datos de Entrada (Input)
                        </h4>
                        <div class="bg-gray-900 rounded border border-gray-700 p-1">
                            <pre><code id="inputJson" class="language-json custom-scrollbar text-sm rounded"></code></pre>
                        </div>
                    </div>

                    <!-- Box: OUTPUT -->
                    <div>
                        <h4
                            class="text-sm font-semibold text-green-400 uppercase tracking-wider mb-2 flex items-center gap-2">
                            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                            </svg>
                            Datos de Salida (Output)
                        </h4>
                        <div class="bg-gray-900 rounded border border-gray-700 p-1">
                            <pre><code id="outputJson" class="language-json custom-scrollbar text-sm rounded"></code></pre>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Footer Modal -->
            <div
                class="px-6 py-4 border-t border-gray-700 bg-gray-800 rounded-b-xl flex justify-between items-center text-sm">
                <span id="modalMeta" class="text-gray-400 font-mono"></span>
                <button onclick="closeModal()"
                    class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded transition font-medium">Cerrar
                    Visor</button>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="app.js?v=6"></script>
</body>

</html>
